    <style>
        :root {
            font-size: clamp(14px, 1.2vw, 16px);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: none;
            background-color: #f8fafc;
        }
        
        .ambient-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: linear-gradient(135deg, #f0fdfa 0%, #eff6ff 100%);
        }

        /* Noise texture for premium feel */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
        }

        .ambient-shape {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: ambient-float 20s infinite ease-in-out alternate;
            will-change: transform;
        }

        .shape-1 { top: -10%; left: -10%; width: 80vw; height: 80vw; background: radial-gradient(circle, #e0e7ff 0%, transparent 70%); animation-duration: 25s; }
        .shape-2 { bottom: -20%; right: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, #ccfbf1 0%, transparent 70%); animation-duration: 30s; animation-direction: reverse; }
        .shape-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: radial-gradient(circle, #fce7f3 0%, transparent 70%); opacity: 0.3; animation-duration: 35s; }

        @keyframes ambient-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, 40px) scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: float 5s ease-in-out infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.5); border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(100, 116, 139, 0.8); }

        @media print {
            header, nav, button, .no-print, .ambient-background, .noise-overlay { 
                display: none !important; 
            }
            body { background: white; }
        }
    </style>
