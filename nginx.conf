
server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Gzip-komprimering for raskere ytelse
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # SPA Ruting: Sender alle forespørsler til index.html
    # Dette gjør at dype lenker (som /bli-med) fungerer uten 404
    location / {
        try_files $uri $uri/ /index.html;
        
        # Ikke cache index.html for å sikre at brukere alltid får siste versjon
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache statiske ressurser (bilder, skrifter) for bedre ytelse
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Feilhåndtering
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
